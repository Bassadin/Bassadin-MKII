name: Build, Test and Deploy with FTP

on:
  push:
  pull_request:
  merge_group:

jobs:
    build:
        name: Build
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
            - uses: actions/setup-node@60c11408891ef62846c29c28c2374afe5c91fad5 # master
              with:
                  node-version: 24.x
            - name: pnpm module install
              run: pnpm install --frozen-lockfile
            - name: astro build
              run: pnpm run build
            - uses: actions/upload-artifact@0c366cb4fc8897159c94880f94b55bc716ad6a66 # master
              with:
                  name: build-artifact
                  path: dist/

    test-cypress:
        name: Cypress Tests
        runs-on: ubuntu-24.04
        needs:
            - build
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
            - uses: actions/setup-node@60c11408891ef62846c29c28c2374afe5c91fad5 # master
              with:
                  node-version: 24.x
            - uses: actions/download-artifact@2a5974104b6d5dbdb2f9468a3e54da3bdd241578 # master
              with:
                  name: build-artifact
                  path: dist/
            - name: Cypress run
              uses: cypress-io/github-action@v6
              with:
                  start: npx serve dist
                  browser: chrome

    deploy:
        needs:
            - build
            - test-cypress
        runs-on: ubuntu-24.04
        environment:
            name: production
            url: https://bassadin.de/
        # Deploy only on a tag
        if: startsWith(github.ref, 'refs/tags/v')
        name: Deploy to FTP Server
        steps:
            - uses: actions/download-artifact@2a5974104b6d5dbdb2f9468a3e54da3bdd241578 # master
              with:
                  name: build-artifact
                  path: dist/
            - name: Deploy to FTP Server
              uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a # v4.3.6
              with:
                  server: ha01s018.org-dns.com
                  username: bassadin_root_website
                  password: ${{ secrets.FTP_Password }}
                  protocol: ftps
                  local-dir: dist/
                  security: strict
